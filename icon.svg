<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#0f0e0c"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.65" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#e8a045" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#c45c3a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0f0e0c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="55%" stop-color="#e8a045"/>
      <stop offset="100%" stop-color="#c45c3a"/>
    </linearGradient>
    <mask id="crescent">
      <rect width="512" height="512" fill="black"/>
      <circle cx="270" cy="240" r="135" fill="white"/>
      <circle cx="320" cy="210" r="125" fill="black"/>
    </mask>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#halo)"/>

  <rect width="512" height="512" rx="112" fill="url(#moon)" mask="url(#crescent)"/>

  <circle cx="130" cy="130" r="3" fill="#f0ede8" opacity="0.7"/>
  <circle cx="410" cy="385" r="2.5" fill="#f0ede8" opacity="0.6"/>
  <circle cx="155" cy="380" r="2" fill="#e8a045" opacity="0.7"/>
  <circle cx="395" cy="135" r="2" fill="#f0ede8" opacity="0.5"/>
</svg>
